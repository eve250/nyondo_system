{% extends 'base.html' %}

{% block content %}

<div class="bg-zinc-900 p-6 rounded-3xl">

    <h1 class="text-2xl font-bold mb-6">
        Add Sale
    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="grid grid-cols-1 gap-4">

            <input type="text"
                   name="customer"
                   placeholder="Customer Name"
                   class="w-full p-3 rounded-2xl bg-zinc-800 outline-none">

            <input type="number"
                   name="amount_paid"
                   placeholder="Amount Paid"
                   class="w-full p-3 rounded-2xl bg-zinc-800 outline-none">

        </div>

        <!-- PRODUCTS -->

        <div id="sales-container" class="mt-6 space-y-4">

            <div class="grid grid-cols-3 gap-3">

                <select name="product_name"
                        class="p-3 rounded-2xl bg-zinc-800 outline-none">

                    <option value="">Select Product</option>

                    {% for product in products %}

                    <option value="{{ product.id }}">
                        {{ product.product_name }}
                    </option>

                    {% endfor %}

                </select>

                <select name="categories"
                        class="p-3 rounded-2xl bg-zinc-800 outline-none">

                    <option value="">Select Category</option>

                    {% for category in categories %}

                    <option value="{{ category.id }}">
                        {{ category.name }}
                    </option>

                    {% endfor %}

                </select>

                <input type="number"
                       name="quantity"
                       placeholder="Quantity"
                       class="p-3 rounded-2xl bg-zinc-800 outline-none">

            </div>

        </div>

        <button type="button"
                onclick="addRow()"
                class="mt-4 px-5 py-3 bg-zinc-700 rounded-2xl">

            Add Another Product

        </button>

        <button type="submit"
                class="mt-4 px-5 py-3 bg-green-600 rounded-2xl">

            Complete Sale

        </button>

    </form>

</div>

<script>

function addRow() {

    const container = document.getElementById('sales-container')

    const row = `
    
    <div class="grid grid-cols-3 gap-3">

        <select name="product_name"
                class="p-3 rounded-2xl bg-zinc-800 outline-none">

            <option value="">Select Product</option>

            {% for product in products %}

            <option value="{{ product.id }}">
                {{ product.product_name }}
            </option>

            {% endfor %}

        </select>

        <select name="categories"
                class="p-3 rounded-2xl bg-zinc-800 outline-none">

            <option value="">Select Category</option>

            {% for category in categories %}

            <option value="{{ category.id }}">
                {{ category.name }}
            </option>

            {% endfor %}

        </select>

        <input type="number"
               name="quantity"
               placeholder="Quantity"
               class="p-3 rounded-2xl bg-zinc-800 outline-none">

    </div>

    `

    container.insertAdjacentHTML('beforeend', row)
}

</script>

{% endblock %}
