{% extends 'base.html' %}

{% block content %}

<div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 max-w-lg">

    <h2 class="text-2xl font-bold mb-4">
        Delete {{ type }}
    </h2>

    <p class="text-zinc-400 mb-6">
        Are you sure you want to delete this?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button class="bg-red-500 px-5 py-3 rounded-xl">
            Delete
        </button>

    </form>

</div>

{% endblock %}
