{% extends 'base.html' %}

{% block title %}Receipt{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto bg-white text-black p-6 rounded-2xl shadow">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold">Nyondo Hardware</h1>
        <p class="text-sm text-gray-600">Sales Receipt</p>
    </div>

    <!-- DETAILS -->
    <div class="text-sm mb-4">
        <p><strong>Date:</strong> 2026-05-06</p>
        <p><strong>Customer:</strong> John Doe</p>
    </div>

    <hr class="my-4">

    <!-- ITEMS -->
    <div class="text-sm space-y-2">
        <div class="flex justify-between">
            <span>Product:</span>
            <span>Hammer</span>
        </div>

        <div class="flex justify-between">
            <span>Quantity:</span>
            <span>2</span>
        </div>

        <div class="flex justify-between">
            <span>Unit Price:</span>
            <span>USh 25,000</span>
        </div>
    </div>

    <hr class="my-4">

    <!-- TOTAL -->
    <div class="flex justify-between font-semibold text-lg">
        <span>Total</span>
        <span>USh 50,000</span>
    </div>

    <!-- BUTTON -->
    <div class="mt-6 text-center">
        <button onclick="window.print()"
            class="bg-black text-white px-4 py-2 rounded-xl">
            Print Receipt
        </button>
    </div>

</div>

{% endblock %}
