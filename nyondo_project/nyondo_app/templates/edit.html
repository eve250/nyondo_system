{% extends 'base.html' %}

{% block content %}

<div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 max-w-2xl">

    <h2 class="text-2xl font-bold mb-6">
        Edit {{ type }}
    </h2>

    <form method="POST" class="space-y-4">

        {% csrf_token %}

        {% if type == "product" %}
        <label for="">Product Name</label>
        <input type="text" name="product_name" value="{{ item.product_name }}"
            class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700">

        <label for="">size</label>
        <input type="text" name="size" value="{{ item.size }}"
            class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700">

        <label for="">unit price</label>
        <input type="text" name="unit_price" value="{{ item.unit_price }}"
            class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700">

        <label for="">unit cost</label>    
        <input type="text" name="unit_cost" value="{{ item.unit_cost }}"
            class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700">

          <label for="">Quantity</label>    
        <input type="text" name="quantity" value="{{ item.quantity }}"
            class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700">


        {% endif %}

        {% if type == "category" %}

        <input type="text" name="name" value="{{ item.name }}"
            class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700">

        {% endif %}

        <button class="bg-emerald-500 px-5 py-3 rounded-xl">
            Update
        </button>

    </form>

</div>

{% endblock %}
