{% extends 'base.html' %}

{% block title %}Sales{% endblock %}

{% block content %}

<h2 class="text-2xl font-semibold mb-6">Sales Records</h2>

<div class="bg-zinc-900 p-4 rounded-3xl">

    <table class="w-full text-sm">

        <thead class="bg-zinc-800 text-zinc-300">
            <tr>
                <th class="p-3 text-left">Customer</th>
                <th class="p-3 text-left">Product id</th>
                <th class="p-3 text-left">Quantity</th>
                <th class="p-3 text-left">Total</th>
                <th class="p-3 text-left">Date</th>
            </tr>
        </thead>

        <tbody>
            <tr class="border-t border-zinc-800">
                <td class="p-3">John Doe</td>
                <td class="p-3">Hammer</td>
                <td class="p-3">2</td>
                <td class="p-3 text-emerald-400">USh 50,000</td>
                <td class="p-3">2026-05-06</td>
            </tr>
        </tbody>

    </table>
    <div>
        <a href="/addsale/"
            class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-xl text-white text-sm">
            Add Sale
        </a>
    </div>
</div>

{% endblock %}
